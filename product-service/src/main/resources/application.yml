server:
  port: 8081

spring:
  application:
    name: product-service

  # ── PostgreSQL ────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/product_db
    username: ${DB_USER:ecommerce}
    password: ${DB_PASSWORD:ecommerce}

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages the schema — never use create/update in prod
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Flyway (database migrations) ──────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Elasticsearch ─────────────────────────────────────────────────
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

  # ── Redis Cache ───────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 600000        # 10 minutes default TTL (milliseconds)
      cache-null-values: false

# ── Spring Boot Actuator (health checks for Kubernetes) ───────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
    elasticsearch:
      enabled: true

# ── OpenAPI / Swagger ─────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ── App config ────────────────────────────────────────────────────
app:
  cache:
    products-ttl: 600             # seconds — used in @Cacheable TTL override
  elasticsearch:
    index-name: products
