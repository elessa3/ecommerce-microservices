<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 8px; overflow: hidden; }
        .header { background-color: #1a1a2e; color: #ffffff; padding: 24px; text-align: center; }
        .header h1 { margin: 0; font-size: 20px; }
        .body { padding: 24px; color: #333333; }
        .order-number { font-size: 18px; font-weight: bold; color: #1a1a2e; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eeeeee; font-size: 14px; }
        .total-row td { font-weight: bold; border-top: 2px solid #1a1a2e; border-bottom: none; }
        .footer { padding: 16px 24px; font-size: 12px; color: #999999; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Order Confirmation</h1>
        </div>
        <div class="body">
            <p>Thank you for your order! We've received it and are getting it ready.</p>
            <p class="order-number">Order <span th:text="${orderNumber}">ORD-2026-00001</span></p>

            <table>
                <thead>
                    <tr><th>Product</th><th>Qty</th><th>Price</th></tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.productName}">Product name</td>
                        <td th:text="${item.quantity}">1</td>
                        <td th:text="${item.unitPrice} + ' ' + ${currency}">0.00</td>
                    </tr>
                    <tr class="total-row">
                        <td colspan="2">Total</td>
                        <td th:text="${totalAmount} + ' ' + ${currency}">0.00</td>
                    </tr>
                </tbody>
            </table>

            <p style="margin-top: 24px;">We'll send you another email once your order ships.</p>
        </div>
        <div class="footer">
            This is an automated message from the Ecommerce Microservices demo project.
        </div>
    </div>
</body>
</html>
